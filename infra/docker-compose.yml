# 开发环境基础设施：仅 Postgres + Redis
# api / worker / web 在本地用 uv run / npm run dev 跑（开发体验更快）
# Phase 3 SaaS 化时会加 api/worker/web 的 Dockerfile + 生产 compose
#
# 端口避让：宿主机其他项目已占用 5432/6379，本项目用 5433/6380
# backend/.env 的 DATABASE_URL 和 REDIS_URL 必须用 5433/6380

services:
  postgres:
    image: postgres:16-alpine
    container_name: wda-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wda
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: wda-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
